name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend tests & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check backend/

      - name: Run backend tests
        run: pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend lint & type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: svelte-check (type check)
        run: npm run check
        working-directory: frontend

      - name: Vitest unit tests
        run: npm test
        working-directory: frontend

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies & build
        run: npm ci && npm run build
        working-directory: frontend

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Start server
        run: |
          export SECRET_KEY="ci-test-secret-key-placeholder-32x"
          uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
        env:
          DISABLE_SCHEDULER: "true"

      - name: Run e2e tests
        run: pytest frontend/tests/ -v --tb=short
        continue-on-error: true  # e2e tests may require seed data; don't block PRs

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t partiu:ci .

      - name: Smoke test (startup check)
        run: |
          docker run --rm -d \
            -e SECRET_KEY="ci-test-secret-key-placeholder-32x" \
            -e DISABLE_SCHEDULER="true" \
            --name partiu_ci \
            partiu:ci
          sleep 5
          docker logs partiu_ci
          docker inspect partiu_ci --format='{{.State.Running}}' | grep true
          docker stop partiu_ci
